server:
  port: 8080

spring:
  application:
    name: taskflow-api

  datasource:
    url: jdbc:mysql://localhost:3306/taskflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
    show-sql: true

app:
  jwt:
    secret: taskflow-super-secret-key-at-least-256-bits-long-for-hs256-algorithm
    expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.taskflow: DEBUG
    org.springframework.security: INFO

gemini:
  api:
    key: AIzaSyAc_j3dYsJi-IYFZUUnmSqzCAk-j6Hy1BQ